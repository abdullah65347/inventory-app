<div class="layout-wrapper">
  <aside class="sidebar" [class.collapsed]="collapsed()" [class.sidebar-open]="sidebarOpen()">
    <app-sidebar [sections]="navSections" roleLabel="Staff" profileRoute="/staff/profile"
      accentGradient="linear-gradient(135deg,#10b981,#06b6d4)">
    </app-sidebar>
  </aside>

  @if (sidebarOpen()) {
  <div class="sidebar-overlay" (click)="sidebarOpen.set(false)"></div>
  }

  <main class="main-content" [class.sidebar-collapsed]="collapsed()">
    <header class="topbar">
      <div class="topbar-left">
        <!-- Desktop: collapse/expand. Mobile: open overlay -->
        <button class="topbar-btn" (click)="onMenuClick()">
          <i class="bi" [ngClass]="collapsed() ? 'bi-layout-sidebar' : 'bi-list'"></i>
        </button>
        <div class="topbar-title-group">
          <div class="topbar-title-row">
            <p class="topbar-title">Staff Portal</p>
            <a routerLink="" class="topbar-home-btn" title="Home">
              <i class="bi bi-house-fill"></i>
            </a>
          </div>
          <p class="topbar-sub">Billing & sales</p>
        </div>
      </div>
      <div class="topbar-actions">
        <app-theme-toggle />
        <button class="topbar-btn"><i class="bi bi-bell"></i></button>
      </div>
    </header>
    <div class="page-content"><router-outlet /></div>
  </main>
</div>
<app-chatbot />
