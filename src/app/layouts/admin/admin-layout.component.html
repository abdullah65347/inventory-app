<div class="layout-wrapper">
  <aside class="sidebar" [class.collapsed]="collapsed()" [class.sidebar-open]="sidebarOpen()">
    <app-sidebar [sections]="navSections" roleLabel="Admin" profileRoute="/admin/profile"
      accentGradient="linear-gradient(135deg,#4f46e5,#7c3aed)">
    </app-sidebar>
  </aside>

  @if (sidebarOpen()) {
  <div class="sidebar-overlay" (click)="sidebarOpen.set(false)"></div>
  }

  <main class="main-content" [class.sidebar-collapsed]="collapsed()">
    <header class="topbar">
      <div class="topbar-left">
        <!-- Desktop: collapse/expand. Mobile: open overlay -->
        <button class="topbar-btn" (click)="onMenuClick()">
          <i class="bi" [ngClass]="collapsed() ? 'bi-layout-sidebar' : 'bi-list'"></i>
        </button>
        <div class="topbar-title-group">
          <div class="topbar-title-row">
            <p class="topbar-title">Admin Portal</p>
            <a routerLink="" class="topbar-home-btn" title="Home">
              <i class="bi bi-house-fill"></i>
            </a>
          </div>
          <p class="topbar-sub">Inventory Management System</p>
        </div>
      </div>
      <div class="topbar-actions">
        <app-theme-toggle />
        <!-- Replace the bell button with this -->
        <button class="topbar-btn notif-bell" (click)="notifDrawer.toggle()" title="Notifications">
          <i class="bi bi-bell-fill"></i>
          @if (notifDrawer.items().length > 0) {
          <span class="bell-dot"></span>
          }
        </button>

        <app-low-stock-sidebar #notifDrawer />
      </div>
    </header>
    <div class="page-content"><router-outlet /></div>
  </main>
</div>
<app-chatbot />
