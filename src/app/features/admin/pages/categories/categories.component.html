<div class="page-enter" @fadeIn>
  <div class="page-header">
    <div class="page-header-left"><h4>Categories</h4><p>Organize products by category</p></div>
    <div class="page-header-right">
      <button class="btn btn-primary" (click)="openCreate()"><i class="bi bi-plus-lg"></i> Add Category</button>
    </div>
  </div>

  @if (loading()) { <app-loader /> }
  @else {
    <div class="cat-grid">
      @if (categories().length === 0) {
        <div class="empty-state" style="grid-column:1/-1"><i class="bi bi-tags"></i><p>No categories yet</p></div>
      }
      @for (c of categories(); track c.id) {
        <div class="cat-card">
          <div class="cat-icon"><i class="bi bi-tag-fill"></i></div>
          <div class="cat-info">
            <div class="cat-name">{{ c.name }}</div>
            <div class="cat-id">ID #{{ c.id }}</div>
          </div>
          <div class="cat-actions">
            <button class="btn btn-icon btn-ghost" (click)="openEdit(c)"><i class="bi bi-pencil"></i></button>
            <button class="btn btn-icon btn-ghost" (click)="delete(c)" style="color:var(--danger)"><i class="bi bi-trash"></i></button>
          </div>
        </div>
      }
    </div>
  }
</div>

@if (showModal()) {
  <div class="modal-overlay" (click)="closeModal()">
    <div class="modal-box modal-sm" (click)="$event.stopPropagation()">
      <div class="modal-header">
        <h5 class="modal-title">{{ editTarget() ? 'Edit Category' : 'Add Category' }}</h5>
        <button class="modal-close" (click)="closeModal()">×</button>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label class="form-label">Category Name</label>
          <input class="form-control" [(ngModel)]="formName" placeholder="e.g. Electronics" (keyup.enter)="save()">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-secondary" (click)="closeModal()">Cancel</button>
        <button class="btn btn-primary" (click)="save()">{{ editTarget() ? 'Save Changes' : 'Add' }}</button>
      </div>
    </div>
  </div>
}
