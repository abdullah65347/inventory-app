@if (visible) {

<div class="modal-overlay" (click)="close.emit()">

    <div class="modal-box" (click)="$event.stopPropagation()">

        <div class="modal-header">
            <h5 class="modal-title">Add Supplier</h5>
            <button class="modal-close" (click)="close.emit()">×</button>
        </div>

        <div class="modal-body">

            <div class="form-group">
                <label class="form-label">Company Name</label>
                <input class="form-control" [(ngModel)]="form.companyName" placeholder="Acme Corp">
            </div>

            <div class="form-group">
                <label class="form-label">Category</label>

                <select class="form-select" [(ngModel)]="form.categoryId">

                    <option [value]="0">
                        -- Select Category --
                    </option>

                    @for (c of categories; track c.id) {
                    <option [value]="c.id">
                        {{ c.name }}
                    </option>
                    }

                </select>
            </div>

            <div class="form-group">
                <label class="form-label">User Account</label>

                <select class="form-select" [(ngModel)]="form.userId" [disabled]="isEdit">

                    <option [ngValue]="null">
                        -- No User Account --
                    </option>

                    @for (u of availableUsers; track u.id) {
                    <option [ngValue]="u.id">
                        {{ u.name }} ({{ u.email }})
                    </option>
                    }

                </select>
            </div>

            <div class="form-group">
                <label class="form-label">Address</label>

                <input class="form-control" [(ngModel)]="form.address" placeholder="Business address">
            </div>

        </div>

        <div class="modal-footer">

            <button class="btn btn-outline-secondary" (click)="close.emit()">

                Cancel

            </button>

            <button class="btn btn-primary" (click)="save.emit(form)">

                Add Supplier

            </button>

        </div>

    </div>

</div>

}
