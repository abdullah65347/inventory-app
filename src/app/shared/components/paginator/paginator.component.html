@if (totalItems > 0) {
<div class="paginator">

    <div class="paginator-info">
        Showing <strong>{{ start }}–{{ end }}</strong> of <strong>{{ totalItems }}</strong>
    </div>

    <div class="paginator-controls">

        <button class="pg-btn" (click)="prev()" [disabled]="currentPage === 1" title="Previous">
            <i class="bi bi-chevron-left"></i>
        </button>

        @for (page of pages; track $index) {
        @if (page === '...') {
        <span class="pg-dots">…</span>
        } @else {
        <button class="pg-btn" [class.active]="page === currentPage" (click)="go(page)">
            {{ page }}
        </button>
        }
        }

        <button class="pg-btn" (click)="next()" [disabled]="currentPage === totalPages" title="Next">
            <i class="bi bi-chevron-right"></i>
        </button>

    </div>

    <div class="paginator-size">
        <select (change)="onSizeChange($event)">
            @for (s of pageSizes; track s) {
            <option [value]="s" [selected]="s === pageSize">{{ s }} / page</option>
            }
        </select>
    </div>

</div>
}
